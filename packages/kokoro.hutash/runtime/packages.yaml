# common + per-hardware variants (gpu/cpu). hutashd picks a
# variant by GPU detection at install; the package declares both.
python: '3.11'
common:
- hutash-inference
- torch==2.11.0
- torchaudio==2.11.0
- kokoro==0.9.4
- soundfile
- uvicorn
- fastapi
- https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl
variants:
  gpu:
    packages: []
    indexes:
    - https://download.pytorch.org/whl/cpu
  cpu:
    packages: []
    indexes:
    - https://download.pytorch.org/whl/cpu
system_packages:
- build-essential
- git
- curl
- espeak-ng
