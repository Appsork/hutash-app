# Proven launch: the shared hutash_inference server via uvicorn --factory.
command: uvicorn
args:
- --factory
- hutash_inference.server:create_app
- --host
- 127.0.0.1
- --port
- '{port}'
env:
  HUTASH_MODEL_ID: ace-step-1.5
  HUTASH_MODEL_DIR: '{model_dir}'
  HF_HUB_CACHE: '{weights_dir}'
  HF_HUB_OFFLINE: '1'
  HUTASH_HF_REVISION: 82cd0d7b6322bd28cd4e830fe675ddb6180ce36c
port: 8000
health_endpoint: /health
health_timeout: 120
