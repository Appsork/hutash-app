# common + per-hardware variants (gpu/cpu). hutashd picks a
# variant by GPU detection at install; the package declares both.
python: '3.11'
common:
- hutash-inference==0.1.0
- uvicorn==0.44.0
- fastapi==0.136.0
variants:
  cpu:
    packages:
    - llama-cpp-python==0.3.20
    indexes:
    - https://abetlen.github.io/llama-cpp-python/whl/cpu
system_packages:
- build-essential
- git
- curl
