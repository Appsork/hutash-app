# common + per-hardware variants (gpu/cpu). hutashd picks a
# variant by GPU detection at install; the package declares both.
python: '3.11'
common:
- hutash-inference
- chatterbox-tts==0.1.7 --no-deps
- numpy>=2.0.0
- librosa==0.11.0
- s3tokenizer
- transformers==5.2.0
- diffusers==0.29.0
- resemble-perth>=1.0.0
- conformer==0.3.2
- safetensors==0.5.3
- spacy-pkuseg
- pykakasi==2.3.0
- pyloudnorm
- omegaconf
- uvicorn==0.44.0
- fastapi==0.136.0
- python-multipart==0.0.26
- soundfile==0.13.1
variants:
  gpu:
    packages:
    - torch==2.11.0+cu128
    - torchaudio==2.11.0+cu128
    indexes:
    - https://download.pytorch.org/whl/cu128
  cpu:
    packages:
    - torch==2.11.0+cpu
    - torchaudio==2.11.0+cpu
    indexes:
    - https://download.pytorch.org/whl/cpu
system_packages:
- build-essential
- git
- curl
